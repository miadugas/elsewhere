<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">Everywhere dashed route app icon concept</title>
  <desc id="desc">A single dashed route wanders across a clean field and ends at a bold X marker.</desc>
  <defs>
